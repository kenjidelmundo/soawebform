<div class="info" [formGroup]="form">
  <div class="row row--date">
    <div class="lbl">DATE:</div>
    <div class="val">
      <input class="dateIn" type="date" formControlName="date">
    </div>
  </div>

  <div class="row">
    <div class="lbl">Name of Payee:</div>
    <div class="val">
      <select class="payeeSel infoField" formControlName="payeeName">
        <option value="">-- Select Payee --</option>
        @for (p of payees; track p) {
          <option [value]="p.id">{{ p.name }}</option>
        }
      </select>
    </div>
  </div>

  <div class="row">
    <div class="lbl">Address</div>
    <div class="val">
      <input
        class="infoField"
        type="text"
        formControlName="address"
        readonly
        (click)="handleAddressClick($event)"
      >
    </div>
  </div>

  <div class="row">
    <div class="lbl">PARTICULARS:</div>
    <div class="val">
      <input
        class="infoField"
        #particularsInput
        type="text"
        formControlName="particulars"
        readonly
        (mouseenter)="handleParticularsEnter(particularsInput)"
        (mouseleave)="handleParticularsLeave()"
        (click)="handleParticularsClick($event)"
      >
    </div>
  </div>

  <div class="row periodRow">
    <div class="lbl">PERIOD COVERED:</div>
    <div class="val">
      <div class="pcGrid3">
        <div class="pcCol">
          <div class="pcCap">From</div>
          <input class="pcIn" type="date" formControlName="periodFrom">
        </div>

        <div class="pcCol">
          <div class="pcCap">To</div>
          <input class="pcIn" type="date" formControlName="periodTo">
        </div>

        <div class="pcCol">
          <div class="pcCap">Years</div>
          <input class="pcIn" type="number" min="0" formControlName="periodYears">
        </div>
      </div>
    </div>
  </div>
</div>
